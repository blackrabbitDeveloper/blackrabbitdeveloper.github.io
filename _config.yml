title: BlackRabbit LAB
description: STOCKER — 기술적 분석·재무 필터·자기학습 기반 미국 주식 리서치 자동화 시스템의 시장 분석 블로그. blackrabbitlab.site
url: "https://blackrabbitdeveloper.github.io"
baseurl: ""
lang: ko

author:
  name: BlackRabbit LAB
  github: blackrabbitdeveloper

markdown: kramdown
highlighter: rouge
permalink: /posts/:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge


defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - README.md
  - package.json
  - tailwind.config.js
  - src/
  - node_modules/
  - blog/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
