title: BlackRabbit LAB Blog
description: BlackRabbit LAB이 운영하는 투자·경제 교육 블로그. 주식·ETF·거시경제·재테크 개념을 누구나 이해할 수 있도록 쉽게 풀어 설명합니다.
url: "https://blackrabbitdeveloper.github.io"
baseurl: ""
lang: ko

author:
  name: BlackRabbit LAB
  github: blackrabbitdeveloper

markdown: kramdown
highlighter: rouge
permalink: /posts/:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge


defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - README.md
  - package.json
  - tailwind.config.js
  - src/
  - node_modules/
  - blog/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
