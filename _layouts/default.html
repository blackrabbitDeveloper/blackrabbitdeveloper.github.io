<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <meta name="theme-color" content="#0c0c0c" />
  {% if page.title %}
  <title>{{ page.title }} – {{ site.title }}</title>
  {% else %}
  <title>{{ site.title }}</title>
  {% endif %}
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: '#3ECF8E' },
          fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] },
          typography: {
            invert: {
              css: {
                '--tw-prose-body': '#a1a1aa',
                '--tw-prose-headings': '#ffffff',
                '--tw-prose-links': '#3ECF8E',
                '--tw-prose-bold': '#e4e4e7',
                '--tw-prose-counters': '#71717a',
                '--tw-prose-bullets': '#52525b',
                '--tw-prose-hr': 'rgba(255,255,255,0.1)',
                '--tw-prose-quotes': '#a1a1aa',
                '--tw-prose-quote-borders': '#3ECF8E',
                '--tw-prose-captions': '#71717a',
                '--tw-prose-code': '#3ECF8E',
                '--tw-prose-pre-code': '#d4d4d8',
                '--tw-prose-pre-bg': '#181818',
                '--tw-prose-th-borders': 'rgba(255,255,255,0.1)',
                '--tw-prose-td-borders': 'rgba(255,255,255,0.07)',
              },
            },
          },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="{{ '/css/styles.css' | relative_url }}" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3935883771879302" crossorigin="anonymous"></script>
</head>
<body class="min-h-screen bg-[#0c0c0c] font-sans text-white antialiased">
  <a href="#main" class="skip-link">본문으로 건너뛰기</a>

  <header class="sticky top-0 z-50 border-b border-white/10 bg-[#0c0c0c]/80 backdrop-blur-xl">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-4 sm:px-6">
      <a href="{{ '/' | relative_url }}" class="text-lg font-semibold tracking-tight text-white no-underline">
        Black<span class="text-brand">Rabbit</span> LAB
      </a>
      <nav class="flex items-center gap-4 sm:gap-6">
        <a href="{{ '/' | relative_url }}" class="text-sm font-medium text-zinc-400 transition hover:text-white">블로그</a>
        <a href="{{ '/projects' | relative_url }}" class="text-sm font-medium text-zinc-400 transition hover:text-white">프로젝트</a>
        <a href="{{ '/about' | relative_url }}" class="text-sm font-medium text-zinc-400 transition hover:text-white">소개</a>
      </nav>
    </div>
  </header>

  <main id="main" class="pb-24">
    {{ content }}
  </main>

  <footer class="border-t border-white/10 py-8 text-center">
    <div class="mb-3 flex justify-center gap-6">
      <a href="{{ '/about' | relative_url }}" class="text-sm text-zinc-500 transition hover:text-white">소개</a>
      <a href="{{ '/projects' | relative_url }}" class="text-sm text-zinc-500 transition hover:text-white">프로젝트</a>
      <a href="{{ '/privacy' | relative_url }}" class="text-sm text-zinc-500 transition hover:text-white">개인정보처리방침</a>
      <a href="https://github.com/blackrabbitdeveloper" target="_blank" rel="noopener noreferrer" class="text-sm text-zinc-500 transition hover:text-white">GitHub</a>
    </div>
    <p class="text-sm text-zinc-600">© {{ 'now' | date: "%Y" }} BlackRabbit LAB. All rights reserved.</p>
  </footer>

  <script src="{{ '/js/main.js' | relative_url }}"></script>
</body>
</html>
